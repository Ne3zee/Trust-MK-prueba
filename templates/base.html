{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TrustMarket{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
<header class="site-header">
    <div class="container nav-wrap">
        <a class="brand" href="{% url 'core:home' %}">TrustMarket</a>
        <nav>
            <a href="{% url 'core:home' %}#inicio">Inicio</a>
            <a href="{% url 'core:home' %}#servicios">Servicios</a>
            <a href="{% url 'core:home' %}#nosotros">Sobre Nosotros</a>
            <a href="{% url 'jobs:apply' %}">Trabaja con Nosotros</a>
            <a href="{% url 'core:home' %}#contacto">Contacto</a>
        </nav>
    </div>
</header>
<main>
    {% block content %}{% endblock %}
</main>
<footer class="site-footer">
    <div class="container">
        <p>© {% now "Y" %} TrustMarket. Atención y ventas para seguros de salud.</p>
    </div>
</footer>
</body>
</html>
